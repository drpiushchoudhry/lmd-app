<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LMD Surgical Analyzer</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

h1 {
    text-align: center;
    color: #38bdf8;
}

/* LAYOUT */
.container {
    display: flex;
    height: 90vh;
    padding: 15px;
    gap: 15px;
}

/* LEFT VIDEO */
.left {
    flex: 2;
}

video {
    width: 100%;
    border-radius: 10px;
}

/* RIGHT PANEL */
.right {
    flex: 1;
    background: #1e293b;
    padding: 15px;
    border-radius: 10px;
}

.controls {
    text-align: center;
}

button {
    padding: 10px 20px;
    background: #3b82f6;
    border: none;
    border-radius: 5px;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #2563eb;
}

/* SCORE */
#score {
    text-align: center;
    font-size: 22px;
    margin: 15px 0;
    color: #f97316;
}

/* METRICS */
.metric {
    margin: 6px 0;
    font-size: 13px;
}

.bar {
    height: 6px;
    background: #334155;
    border-radius: 5px;
    margin-top: 3px;
}

.fill {
    height: 100%;
    border-radius: 5px;
}

/* LOADER */
.loader {
    border: 4px solid #334155;
    border-top: 4px solid #3b82f6;
    border-radius: 50%;
    width: 30px;
    height: 30px;
    animation: spin 1s linear infinite;
    margin: 10px auto;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<h1>LMD Surgical Analyzer</h1>

<div class="container">

    <!-- LEFT -->
    <div class="left">
        <video id="videoPreview" controls></video>
    </div>

    <!-- RIGHT -->
    <div class="right">

        <div class="controls">
            <input type="file" id="fileInput" accept="video/*">
            <br><br>
            <button id="uploadBtn">Analyze</button>
        </div>

        <div id="score">Upload video to begin</div>
        <div id="metrics"></div>

    </div>

</div>

<script src="app.js"></script>

<script>
const fileInput = document.getElementById("fileInput");
const videoPreview = document.getElementById("videoPreview");

fileInput.addEventListener("change", function () {
    const file = this.files[0];
    if (file) {
        videoPreview.src = URL.createObjectURL(file);
    }
});
</script>

</body>
</html>
